name: openclaw-mission-control

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      # Build from repo root so the backend image can include repo-level assets
      # like `backend/templates/`.
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Override localhost defaults for container networking
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      RQ_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    # Optional, user-managed env file.
    # IMPORTANT: do NOT load `.env.example` here because it contains non-empty
    # placeholder Clerk keys, which can accidentally flip Clerk "on".
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    develop:
      watch:
        # Rebuild frontend image when UI source or build config changes.
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/next.config.ts
        - action: rebuild
          path: ./frontend/postcss.config.js
        - action: rebuild
          path: ./frontend/tailwind.config.cjs
        - action: rebuild
          path: ./frontend/tsconfig.json

  webhook-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "scripts/rq-docker", "worker"]
    env_file:
      - path: ./backend/.env
        required: false
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import redis, os, sys; r=redis.from_url(os.environ['RQ_REDIS_URL']); sys.exit(0 if r.ping() else 1)\""]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_DISPATCH_THROTTLE_SECONDS: ${RQ_DISPATCH_THROTTLE_SECONDS:-2.0}
      RQ_DISPATCH_MAX_RETRIES: ${RQ_DISPATCH_MAX_RETRIES:-3}
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # HTTPS reverse proxy (Caddy) — DORMANT. Uncomment this block and follow the
  # steps in PATCH_NOTES_20260425_PRODUCTION_AUDIT.md to activate HTTPS.
  # -------------------------------------------------------------------------
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #     frontend:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  postgres_data:
  # caddy_data: {}
  # caddy_config: {}
